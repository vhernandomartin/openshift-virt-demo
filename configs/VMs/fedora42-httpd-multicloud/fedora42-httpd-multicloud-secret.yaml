apiVersion: v1
kind: Secret
metadata:
  name: fedora42-httpd-multicloud-secret
type: Opaque
stringData:
  userData: |-
    #cloud-config
    write_files:
      - path: /usr/local/bin/update-metadata.sh
        permissions: '0755'
        content: |
          #!/bin/bash
          # Gather Data
          NETNAME=$(dig +short myip.opendns.com @resolver1.opendns.com| xargs whois| grep -i netname|head -1| cut -d ":" -f 2|sed 's/ //g')
          PUBLIC_IP=$(dig +short myip.opendns.com @resolver1.opendns.com)


          cat <<EOF > /var/www/html/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>KubeVirt Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
              body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
              .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); border: 1px solid #334155; }
              .stat-val { font-size: 1.5rem; font-weight: bold; color: #38bdf8; font-family: monospace; }
              h3 { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; }
              canvas { max-height: 200px; }
            </style>
          </head>
          <body>
            <div class="grid">
              <div class="card"><h3>Network & Info</h3>
                <p>ISP: <span class="stat-val">${NETNAME}</span></p>
                <p>IP: <span class="stat-val">${PUBLIC_IP}</span></p>
                <p>Local Time: <span id="clock" class="stat-val"></span></p>
              </div>
              <div class="card"><h3>Resource Usage (%)</h3>
                <canvas id="usageChart"></canvas>
              </div>
            </div>

            <script>
              // Live Clock
              setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
              }, 1000);

              // Initialize Chart
              const ctx = document.getElementById('usageChart').getContext('2d');
              const usageChart = new Chart(ctx, {
                type: 'line',
                data: {
                  labels: Array(10).fill(''),
                  datasets: [{
                    label: 'CPU %',
                    data: Array(10).fill(0),
                    borderColor: '#e94560',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(233, 69, 96, 0.1)'
                  }, {
                    label: 'RAM %',
                    data: Array(10).fill(0),
                    borderColor: '#38bdf8',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.1)'
                  }]
                },
                options: { 
                  scales: { y: { beginAtZero: true, max: 100, grid: { color: '#334155' } }, x: { display: false } },
                  plugins: { legend: { labels: { color: '#f8fafc' } } }
                }
              });

              // Simulate live data updates (In a real scenario, you'd fetch an API here)
              setInterval(() => {
                usageChart.data.datasets[0].data.shift();
                usageChart.data.datasets[0].data.push(Math.floor(Math.random() * 30) + 5); // Simulated CPU
                usageChart.data.datasets[1].data.shift();
                usageChart.data.datasets[1].data.push(Math.floor(Math.random() * 20) + 40); // Simulated RAM
                usageChart.update('none');
              }, 2000);
            </script>
          </body>
          </html>
          EOF

    runcmd:
      - [sh, -xc, "mkdir -p /var/www/html"]
      - [sh, -xc, "/usr/local/bin/update-metadata.sh"]